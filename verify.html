<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verified</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="banner">
            <span class="banner-text">EMAIL VERIFIED</span>
        </div>
        <span class="card__title">Verification Result</span>
        <p class="card__subtitle" id="verify-message">Verifying your email...</p>
        <p class="card__subtitle"><a id="home-link" href="index.html">Return to homepage</a></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = 'https://bzcyefocafeiebezobpi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6Y3llZm9jYWZlaWViZXpvYnBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDEyNDMsImV4cCI6MjA5NDYxNzI0M30.loITdVw-I9vsEmiDLx1YYJny4ZO5OGM_tGbQ0MB51BU';
        const messageEl = document.getElementById('verify-message');

        async function markVerified(email) {
            const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const tableNames = ['subscibers', 'subscribers'];

            for (const tableName of tableNames) {
                const { error } = await client.from(tableName).update({
                    verified: true,
                    verified_at: new Date().toISOString()
                }).eq('email', email);

                if (!error) {
                    return;
                }

                const missingMessage = `Could not find the table 'public.${tableName}'`;
                if (error.message && error.message.includes(missingMessage)) {
                    console.warn(`Supabase table ${tableName} not found; trying fallback table name.`);
                    continue;
                }

                console.error('Supabase verify update error:', error);
                return;
            }
        }

        async function init() {
            if (!window.supabase) {
                messageEl.textContent = 'Unable to load Supabase. Please try again later.';
                return;
            }

            const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const { data, error } = await client.auth.getSessionFromUrl({ storeSession: false });

            if (error) {
                console.error('Supabase verify error:', error);
                messageEl.textContent = 'Unable to verify your email. Please use the link in your email again.';
                return;
            }

            const email = data?.session?.user?.email;
            if (!email) {
                messageEl.textContent = 'Verification link not recognized. Please open the link from your email.';
                return;
            }

            await markVerified(email);
            messageEl.textContent = `Success! ${email} has been verified.`;
        }

        init();
    </script>
</body>
</html>
