<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Ultra&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
    <div class="banner">
        <span class="banner-text">SUBSCRIBE</span>
    </div>
    <span class="card__title">Sign up</span>
    <p class="card__subtitle">Sign up for announcements and updates.</p>
    <form id="signup-form" class="card__form">
        <input id="email-input" placeholder="Your Email" type="email" required />
        <div id="error-msg" class="error" aria-live="polite"></div>
        <button class="sign-up" type="submit">Sign up</button>
    </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
