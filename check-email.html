<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Sent</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="banner">
            <span class="banner-text">CHECK EMAIL</span>
        </div>
        <span class="card__title">Verify your email</span>
        <p class="card__subtitle">A verification email has been prepared for <strong id="email-address">your email</strong>.</p>
        <p class="card__subtitle">Open the email we sent and click the verification link to complete your signup.</p>
        <p class="card__subtitle">If you don't see it, check your spam folder or wait a moment for delivery.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email') || 'your email';
        document.getElementById('email-address').textContent = email;
    </script>
</body>
</html>
